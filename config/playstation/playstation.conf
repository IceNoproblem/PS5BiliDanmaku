# bao3/playstation 配置文件
# 用于优化视频质量和推流参数

# ============================================
# RTMP 推流配置
# ============================================
rtmp:
  # 推流路径
  application: /app
  
  # 音频配置
  audio:
    sample_rate: 48000
    channels: 2
    bitrate: 384  # 提升到384kbps（极致音质）
    codec: aac  # 使用AAC编码
    aac_profile: aac_low  # AAC-LC 配置（兼容性最好）

# ============================================
# 视频编码配置
# ============================================
video:
  # 编码预设（质量设置）
  # veryfast: 最快编码，质量较低
  # fast: 快速编码，质量中等
  # medium: 中等速度，质量较高
  # slow: 慢速编码，质量最高（推荐）
  # veryslow: 最慢编码，质量最高但CPU占用高
  preset: slow
  
  # 编码配置文件
  # baseline: 基本配置（兼容性最好）
  # main: 主流配置
  # high: 高级配置（推荐）
  profile: high
  
  # 调整参数（画质）
  # 1-51: 数值越低，画质越好
  # 18: 高质量（当前）
  # 16: 极致画质（推荐用于1080p）
  # 14: 接近无损（CPU占用高）
  crf: 16
  
  # 最大码率（通过环境变量覆盖）
  max_bitrate: 15000
  
  # 缓冲区大小（2秒）
  bufsize: 30000
  
  # 关键帧间隔（每2秒一个关键帧）
  gop: 60
  
  # 硬件加速（如果支持）
  hwaccel: auto

  # ============================================
  # 高级编码参数（极致画质优化）
  # ============================================
  # 编码器级别
  level: 4.2  # 1080p@60fps 推荐

  # 色彩采样
  # 4:2:0: 标准采样（带宽友好）
  # 4:2:2: 更好的色彩还原
  pix_fmt: yuv420p

  # B帧数量（增加B帧可提高压缩效率）
  b_frames: 4

  # 参考帧数量
  refs: 5

  # 8x8 变换（提高压缩效率）
  eight: true

  # 自适应量化
  aq_strength: 1.2

  # 心理视觉优化
  psy: true
  psy_rd: 1.0
  psy_trellis: 0.75

  # 去块滤镜强度
  deblock: 0:0

  # 运动估计精度
  me_method: umh
  merange: 24

  # 子像素运动估计
  subme: 9  # 最高精度

  # 分析模式
  analyse: all

  # 直接模式决策
  direct: auto

  # CABAC 压缩（比 CAVLC 更高效）
  cabac: true

# ============================================
# HLS 配置（如果使用）
# ============================================
hls:
  enabled: false
  segment_duration: 2
  playlist_length: 30
  
# ============================================
# 日志配置
# ============================================
log:
  level: info
  file: /app/logs/playstation.log
