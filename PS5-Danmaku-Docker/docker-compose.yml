# Docker Compose - PS5 弹幕系统（使用 bao3/playstation）

services:
  # bao3/playstation RTMP 服务器
  playstation-server:
    image: bao3/playstation:latest
    container_name: ps5-playstation-server
    privileged: true
    stdin_open: true
    tty: true
    ports:
      - "8081:80/tcp"      # HTTP状态页面 (宿主机:容器)
      - "1935:1935/tcp"    # RTMP推流端口
    volumes:
      - ./config/playstation:/app/config
      - ./data/playstation:/app/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - STREAM_QUALITY=1080p
      - STREAM_BITRATE=15000
      - STREAM_FPS=60

  # 弹幕转发系统
  danmaku-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ps5-danmaku-system
    ports:
      - "5000:5000/tcp"    # Web管理界面
      - "6667:6667/tcp"   # IRC弹幕端口
    volumes:
      - ./config.json:/app/config.json
      - ./bili_cookies.json:/app/bili_cookies.json
      - ./logs:/app/logs
      - ./room_history.json:/app/room_history.json
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      playstation-server:
        condition: service_started
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
      - LC_ALL=C.UTF-8
      - LANG=C.UTF-8
      - PYTHONWARNINGS="ignore::urllib3.connectionpool:UserWarning"
      - URLLIB3_LOG_LEVEL=CRITICAL
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
      - RTMP_SERVER_HOST=playstation-server
      - RTMP_SERVER_PORT=1935
      - EXTERNAL_IP=${EXTERNAL_IP:-auto}

  # RTMP 监控
  rtmp-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ps5-danmaku-monitor
    # 调试时使用: command: ["python", "monitor_rtmp_debug.py"]
    command: ["python", "monitor_rtmp.py"]
    depends_on:
      - playstation-server
      - danmaku-system
    restart: unless-stopped
    environment:
      - RTMP_SERVER_TYPE=playstation
      # 容器间通信使用容器内部端口 80 (映射为宿主机的 8081)
      - RTMP_MONITOR_URL=http://playstation-server:80
      - DANMAKU_API_URL=http://danmaku-system:5000/api/rtmp/status/update  # 容器间通信
      - DOCKER_ENV=true
      - TZ=Asia/Shanghai
      # 监控间隔(秒),改为2秒以实现更实时的采集
      - CHECK_INTERVAL=2
      # 调试模式(设置为true会保存HTML到/app/debug_playstation.html)
      - DEBUG_MODE=false
      - HTML_OUTPUT_FILE=/app/debug_playstation.html
    volumes:
      - ./debug_output:/app/debug_output  # 调试输出目录

networks:
  default:
    driver: bridge
