# Docker Compose - PS5 弹幕系统（使用 bao3/playstation）
# 部署前请先执行: docker compose run --rm init-dirs（或手动创建目录）

services:

  # ── 一次性初始化容器，确保宿主机目录/文件存在 ──────────────────────
  init-dirs:
    image: busybox
    container_name: ps5-init-dirs
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mkdir -p /host/config/playstation /host/data/playstation /host/logs /host/debug_output
        [ -f /host/config.json ]      || echo '{"WEB_PORT":5000,"BILIBILI_ROOM_ID":0,"TWITCH_CHANNEL":"icenoproblem","IRC_HOST":"0.0.0.0","IRC_PORT":6667,"MAX_SEEN_DANMAKU":1000,"MAX_SEEN_GIFT":500,"HEARTBEAT_TIMEOUT":18000,"ENABLE_GIFT":true,"MAX_LOG_ITEMS":50,"BILIBILI_SESSDATA":"","BILIBILI_BILI_JCT":"","BILIBILI_UID":0,"BILIBILI_UNAME":"","RECONNECT_DELAY":5,"ROOM_HISTORY":[]}' > /host/config.json
        [ -f /host/bili_cookies.json ] || echo '{}' > /host/bili_cookies.json
        echo "✅ 初始化完成"
    volumes:
      - .:/host
    profiles:
      - init

  # bao3/playstation RTMP 服务器
  playstation-server:
    image: bao3/playstation:latest
    container_name: ps5-playstation-server
    privileged: true
    stdin_open: true
    tty: true
    ports:
      - "8081:80/tcp"      # HTTP状态页面 (宿主机:容器)
      - "1935:1935/tcp"    # RTMP推流端口
    volumes:
      - ./config/playstation:/app/config
      - ./data/playstation:/app/data
      # 注意: /etc/timezone 在某些 Linux 发行版可能不存在，如遇报错可注释掉
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - STREAM_QUALITY=1080p
      - STREAM_BITRATE=15000
      - STREAM_FPS=60
    # ── healthcheck：等 nginx HTTP 真正就绪后再放行依赖容器 ──
    # 用 wget 而非 curl（bao3/playstation 镜像可能没有 curl）
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --timeout=3 http://localhost:80 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10        # 最多等 50 秒（start_period + 10 × 5s）
      start_period: 15s  # 容器刚起来后先等 15 秒再开始探测

  # 弹幕转发系统
  danmaku-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ps5-danmaku-system
    ports:
      - "5000:5000/tcp"    # Web管理界面
      - "6667:6667/tcp"    # IRC弹幕端口
    volumes:
      - ./config.json:/app/config.json
      - ./bili_cookies.json:/app/bili_cookies.json
      - ./logs:/app/logs
      # 注意: /etc/timezone 在某些 Linux 发行版可能不存在，如遇报错可注释掉
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      playstation-server:
        condition: service_healthy   # 等 nginx 真正就绪
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
      - LC_ALL=C.UTF-8
      - LANG=C.UTF-8
      - PYTHONWARNINGS=ignore
      - URLLIB3_LOG_LEVEL=CRITICAL
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
      - DOCKER_ENV=true
      - RTMP_SERVER_HOST=playstation-server
      - RTMP_SERVER_PORT=1935
      - EXTERNAL_IP=${EXTERNAL_IP:-auto}
    # ── danmaku-system 的健康检查（供 rtmp-monitor 等待）──
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "--max-time", "3", "http://localhost:5000/status"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  # RTMP 监控
  rtmp-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ps5-danmaku-monitor
    # 调试时使用: command: ["python", "monitor_rtmp_debug.py"]
    command: ["python", "monitor_rtmp.py"]
    depends_on:
      playstation-server:
        condition: service_healthy   # 等 nginx 就绪
      danmaku-system:
        condition: service_healthy   # 等 flask 就绪
    restart: unless-stopped
    environment:
      - RTMP_SERVER_TYPE=playstation
      # 容器间通信使用容器内部端口 80 (映射为宿主机的 8081)
      - RTMP_MONITOR_URL=http://playstation-server:80
      - DANMAKU_API_URL=http://danmaku-system:5000/api/rtmp/status/update
      - DOCKER_ENV=true
      - TZ=Asia/Shanghai
      # 监控间隔(秒)，2秒更实时
      - CHECK_INTERVAL=2
      # 调试模式(设置为true会保存HTML到/app/debug_playstation.html)
      - DEBUG_MODE=false
      - HTML_OUTPUT_FILE=/app/debug_playstation.html
    volumes:
      - ./debug_output:/app/debug_output  # 调试输出目录
      - ./logs:/app/logs                  # 日志共享目录

networks:
  default:
    driver: bridge
