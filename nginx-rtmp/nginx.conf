worker_processes auto;
events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 8192;
        buflen 10s;
        queue 31;

        application live {
            live on;
            record off;
            wait_key on;
            wait_video on;
            sync 10ms;
            meta on;

            # 允许任何IP推流（生产环境建议限制）
            allow publish all;

            # 允许任何IP播放
            allow play all;

            # 推流密码（可选）
            # on_publish http://localhost:5000/api/rtmp/auth;

            # 转推到B站（可选）
            # push rtmp://live-push.bilivideo.com/live-bvc/;
        }
    }
}

http {
    server {
        listen 8080;

        # RTMP统计页面（需要nginx-rtmp-module）
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }

        # 健康检查
        location /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }

    # 可选：HTTP服务器用于访问RTMP流
    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
}
