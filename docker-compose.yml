# Docker Compose - PS5 弹幕系统（使用 bao3/playstation）
version: '3.8'

services:
  # bao3/playstation RTMP 服务器
  playstation-server:
    image: bao3/playstation:latest
    container_name: ps5-playstation-server
    ports:
      - "1935:1935"    # RTMP推流端口
      - "8888:80"       # Web管理界面
    restart: unless-stopped
    networks:
      - ps5-danmaku-network

  # 弹幕转发系统
  danmaku-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ps5-danmaku-system
    ports:
      - "5000:5000"    # Web管理界面
      - "6667:6667"    # IRC服务端口
    volumes:
      - ./config.json:/app/config.json
      - ./bili_cookies.json:/app/bili_cookies.json
      - ./logs:/app/logs
      - ./room_history.json:/app/room_history.json
    depends_on:
      - playstation-server
    restart: unless-stopped
    environment:
      - RTMP_SERVER_HOST=playstation-server
      - RTMP_SERVER_PORT=1935
    networks:
      - ps5-danmaku-network

  # RTMP 监控
  rtmp-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ps5-danmaku-monitor
    command: ["python", "monitor_rtmp.py"]
    volumes:
      - ./config.json:/app/config.json
      - ./logs:/app/logs
    depends_on:
      - playstation-server
      - danmaku-system
    restart: unless-stopped
    environment:
      - RTMP_SERVER_TYPE=playstation
      - RTMP_MONITOR_URL=http://playstation-server:80
      - DANMAKU_API_URL=http://danmaku-system:5000/api/rtmp/status/update
      - DOCKER_ENV=true
    networks:
      - ps5-danmaku-network

networks:
  ps5-danmaku-network:
    driver: bridge
