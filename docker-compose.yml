version: '3.8'

services:
  nginx-rtmp:
    image: tiangolo/nginx-rtmp:latest
    container_name: ps5-danmaku-nginx
    ports:
      - "1935:1935"    # RTMP推流端口
      - "8081:8080"    # RTMP统计页面
      - "8082:80"        # HTTP访问（可选）
    volumes:
      - ./nginx-rtmp/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-rtmp/logs:/var/log/nginx
    restart: unless-stopped
    networks:
      - ps5-danmaku-network

  danmaku-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ps5-danmaku-system
    ports:
      - "5000:5000"    # Web管理界面
      - "6667:6667"    # IRC服务端口
    volumes:
      - ./config.json:/app/config.json
      - ./bili_cookies.json:/app/bili_cookies.json
      - ./logs:/app/logs
      - ./room_history.json:/app/room_history.json
    depends_on:
      - nginx-rtmp
    restart: unless-stopped
    environment:
      - NGINX_RTMP_HOST=nginx-rtmp
      - NGINX_RTMP_PORT=1935
    networks:
      - ps5-danmaku-network

  rtmp-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ps5-danmaku-monitor
    command: ["python", "monitor_rtmp.py"]
    volumes:
      - ./config.json:/app/config.json
      - ./logs:/app/logs
    depends_on:
      - nginx-rtmp
      - danmaku-system
    restart: unless-stopped
    networks:
      - ps5-danmaku-network

networks:
  ps5-danmaku-network:
    driver: bridge
