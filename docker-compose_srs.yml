version: '3.8'

services:
  srs-server:
    image: ossrs/srs:5
    container_name: ps5-danmaku-srs
    ports:
      - "1935:1935"    # RTMP推流端口
      - "1985:1985"    # HTTP API端口
      - "8080:8080"    # HTTP-FLV和HLS
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf:ro
    restart: unless-stopped
    networks:
      - ps5-danmaku-network

  danmaku-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ps5-danmaku-system
    ports:
      - "5000:5000"    # Web管理界面
      - "6667:6667"    # IRC服务端口
    volumes:
      - ./config.json:/app/config.json
      - ./bili_cookies.json:/app/bili_cookies.json
      - ./logs:/app/logs
      - ./room_history.json:/app/room_history.json
    depends_on:
      - srs-server
    restart: unless-stopped
    environment:
      - SRS_HOST=srs-server
      - SRS_PORT=1935
    networks:
      - ps5-danmaku-network

  rtmp-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ps5-danmaku-monitor
    command: ["python", "monitor_rtmp.py"]
    volumes:
      - ./config.json:/app/config.json
      - ./logs:/app/logs
    depends_on:
      - srs-server
      - danmaku-system
    restart: unless-stopped
    environment:
      # 使用环境变量传递 SRS 容器地址
      - RTMP_MONITOR_URL=http://srs-server:1985/api/v1/streams/
      - DANMAKU_API_URL=http://danmaku-system:5000/api/rtmp/status/update
      - DOCKER_ENV=true  # 标记 Docker 环境，禁用 input()
      - RTMP_SERVER_TYPE=srs
    networks:
      - ps5-danmaku-network

networks:
  ps5-danmaku-network:
    driver: bridge
