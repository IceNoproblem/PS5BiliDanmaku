# SRS (Simple Realtime Server) 配置文件
# PS5推流优化版本 - 支持FFmpeg转码提升视频质量
# 基于 Docker 版本 playstation.conf 的参数优化

# ==================== 基础配置 ====================
listen              1935;
max_connections     1000;
daemon              off;

# ==================== HTTP API (用于状态监控) ====================
http_api {
    enabled         on;
    listen          1985;
    cross_domain    on;
}

# ==================== HTTP Server (用于HLS/FLV) ====================
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

# ==================== RTC Server (可选) ====================
rtc_server {
    enabled         off;
    listen          8000;
    candidate       *;
}

# ==================== VHost 配置 ====================
vhost __defaultVhost__ {
    # ==================== 转码配置 (提升视频质量) ====================
    # 当有推流时自动转码
    transcode {
        enabled     on;
        # FFmpeg 路径 (使用项目内的ffmpeg)
        ffmpeg      D:/PS5-Danmaku-Windows/PS5BiliDanmaku-windows/ffmpeg/bin/ffmpeg.exe;
        # 转码模板
        engine {
            # 开启转码
            enabled         on;
            
            # 输入流命名
            i               [vhost]/[app]/[stream];
            
            # 输出流命名 (添加 _hd 后缀)
            o                [vhost]/[app]/[stream]_hd;
            
            # FFmpeg 转码参数 (极致画质)
            # 视频: H.264 High Profile, CRF=16 (高质量), GOP=60
            # 音频: AAC 384kbps, 48kHz立体声
            vcodec          libx264;
            vbitrate        15000;
            vpreset         slow;
            vprofile        high;
            vlevel          4.2;
            vcrf            16;
            vgop            60;
            vthreads        4;
            vbf             4;
            
            # B帧设置 (提高压缩效率)
            # -bf 4 在x264中会被忽略，使用b_frames+refs
            b_frames        4;
            refs            5;
            
            # 色彩空间
            pix_fmt         yuv420p;
            
            # 音频编码
            acodec          aac;
            abitrate        384;
            asample_rate    48000;
            achannels       2;
            aprofile        aac_low;
            
            # 性能优化
            # 运动估计
            me_method       umh;
            merange         24;
            subme           9;
            
            # 分析模式
            analyse         all;
            
            # 心理视觉优化
            psy             on;
            psy_rd          1.0;
            psy_trellis     0.75;
            
            # 去块滤镜
            deblock         0:0;
            
            # 直接模式
            direct          auto;
            
            # CABAC 编码
            cabac           on;
            
            # 自适应量化
            aq_strength     1.2;
            
            # 日志级别
            log             info;
        }
    }

    # ==================== HLS 配置 ====================
    hls {
        enabled         on;
        hls_path        ./objs/nginx/html/hls;
        hls_fragment    2;
        hls_window      60;
        hls_ts_floor    on;
        hls_cleanup     on;
        hls_dispose     300;
    }

    # ==================== HTTP-FLV 配置 ====================
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
        fast_start  on;
    }

    # ==================== RTMP 配置 ====================
    rtmp {
        enabled     on;
    }

    # ==================== 播放配置 ====================
    play {
        # GOP缓存 (减少卡顿)
        gop_cache_max_frames 2500;
        # 队列长度
        queue_length    10;
        # 等待关键帧
        mw_latency      100;
    }

    # ==================== 发布配置 ====================
    publish {
        # 允许所有IP推流
        mr              off;
        # 正常化时间戳
        normalize_time  on;
        # 首次帧
        firstpkt_timeout    20000;
        # 正常帧
        normal_timeout   7000;
    }

    # ==================== 带宽控制 ====================
    tcp_nodelay     on;
    min_latency     on;
    
    # ==================== 录制配置 (可选) ====================
    # record {
    #     enabled     on;
    #     record_path ./objs/nginx/html/record;
    #     record_suffix  .flv;
    # }
}
