# SRS 配置文件
# 由 PS5-Bilibili-Danmaku 自动生成

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    listen         1985;
    enabled        on;
    stats {
        enabled        on;
    }
}

http_server {
    listen         8080;
    dir            ./objs/nginx/html;
}

vhost __defaultVhost__ {
    hls {
        enabled         on;
        hls_path       ./objs/nginx/html;
        hls_fragment    2;
        hls_window     30;
    }

    http_remux {
        enabled on;
        mount [vhost]/[app]/[stream].flv;
    }
}
